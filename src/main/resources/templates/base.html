<!DOCTYPE html>
<html lang="en" th:fragment="parent(content,title,script)" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-th-replace="${title}">Children Bank</title>
    <!-- Flowbite -->
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" th:href="@{'/css/output.css'}">
</head>
<body class="bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300">
    <!-- common header -->
        <!-- is user logged in : navbar -->
     <div th:if="${currentUser}">
    <div th:replace="~{user/user_navbar :: user_navbar}"></div>
  </div>

        <!-- is user not logged in : navbar -->
     <div th:unless="${currentUser}">
    <div th:replace="~{navbar :: navbar}"> </div>
  </div>
     
     

     <!-- main content -->
      <div class="p-4 ">
       <section th:replace="${content}"></section>
    </div>


    <!-- common footer -->
     <div th:unless="${currentUser}">
   <footer class="bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-700 mt-10">

    <div class="max-w-6xl mx-auto px-6 py-10 grid grid-cols-1 md:grid-cols-3 gap-8">

        <!-- Brand -->
        <div>
            <h2 class="text-xl font-bold">Children Bank</h2>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">
                Secure • Fast • Smart Banking Experience
            </p>
        </div>

        <!-- Links -->
        <div>
            <h3 class="font-semibold mb-3">Quick Links</h3>
            <ul class="space-y-2 text-sm text-gray-500 dark:text-gray-400">
                <li><a href="/" class="hover:text-blue-500">Home</a></li>
                <li><a href="/about" class="hover:text-blue-500">About</a></li>
                <li><a href="/contact" class="hover:text-blue-500">Contact</a></li>
            </ul>
        </div>

        <!-- Support -->
        <div>
            <h3 class="font-semibold mb-3">Support</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400">
                Email: support@childrenbank.com
            </p>
            <p class="text-sm text-gray-500 dark:text-gray-400">
                24/7 Customer Support
            </p>
        </div>

    </div>

    <div class="border-t border-gray-200 dark:border-gray-700 py-4 text-center">
        <p class="text-sm text-gray-500 dark:text-gray-400">
            © 2026 Children Bank. All rights reserved.
        </p>
    </div>

</footer>
</div>
<!-- flow bite content -->
<script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
<script th:src="@{'/js/script.js'}"></script>
<th:block data-th-replace="${script}"></th:block>
</body>
</html>
