<!DOCTYPE html>
<html lang="en" th:replace="~{base ::parent(~{::#content}, ~{::title},~{::script})}">
<head>
  <title>Signup Page</title>
</head>
<body > 
  <div id="content">
   <div class="grid grid-cols-12 pt-20">
    <div class="col-span-4 md:col-span-2 lg:col-span-3 xl:col-span-4"></div>
    <div class="col-span-12 md:col-span-8 lg:col-span-6 xl:col-span-4">
         <!-- 6 ki space le rahi hai -->
           <!-- card -->
          <div class="block  p-6 border-t-[10px] border-blue-700 bg-white   rounded-xl shadow-sm hover:bg-gray-100 dark:bg-gray-800 dark:border-blue-700 dark:hover:bg-gray-700">
           
          <!-- message here -->
          <div th:replace="~{message :: messagebox}"></div>
          <h5 class="mb-2 text-2xl font-bold tracking-tight text-gray-900 dark:text-white">Create Account</h5>
          <p class="font-normal text-gray-400 dark:text-gray-400">Start managing banking system on cloud...</p>
         
          <form class="mt-4" th:action="@{/do-register}" method="post" th:object="${userForm}"> 
              <!--name field  -->
              <div class="mb-2">
               <label for="name" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Name</label>
               <input type="text" id="name" th:field="*{name}" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Enter here" required />
               <p th:if="${#fields.hasErrors('name')}"
                  th:errors="*{name}"
                class="text-red-600 px-1 py-0.5"></p> 
              </div>
               
              <!-- email field -->
              <div class="mb-2">
               <label for="email" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Email</label>
               <input type="email" id="email" th:field="*{email}" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="name@flowbite.com" required />
               <p th:if="${#fields.hasErrors('email')}"
                  th:errors="*{email}"
                class="text-red-600 px-1 py-0.5"></p> 
              </div>

              <!--phone field  -->
              <div class="mb-2">
               <label for="phone" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contact Number</label>
               <input type="tel" id="phone" th:field="*{phoneNumber}" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Enter here" pattern="[0-9]{10}" required />
               <p th:if="${#fields.hasErrors('phoneNumber')}"
                  th:errors="*{phoneNumber}"
                class="text-red-600 px-1 py-0.5"></p>  
              </div>

              <!--Aadhaar field  -->
              <div class="mb-2">
               <label for="aadhaar" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Aadhaar Number</label>
               <input type="text" id="aadhaar" th:field="*{aadhaarNumber}" maxlength="12" pattern="[0-9]{12}" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Enter 12-digit Aadhaar" required />
               <p th:if="${#fields.hasErrors('aadhaarNumber')}"
                  th:errors="*{aadhaarNumber}"
                class="text-red-600 px-1 py-0.5"></p>  
              </div>

              <!--password field  -->
              <div class="mb-2">
               <label for="password" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Create Password</label>
               <input type="password" id="password" th:field="*{password}" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"  required />
                <p th:if="${#fields.hasErrors('password')}"
                  th:errors="*{password}"
                class="text-red-600 px-1 py-0.5"></p>  
              </div>

              <!--DOB field  -->
              <div class="mb-2">
               <label for="dob" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">DOB</label>
               <input type="date" id="dob" th:field="*{dob}" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"  required />
                <p th:if="${#fields.hasErrors('dob')}"
                  th:errors="*{dob}"
                class="text-red-600 px-1 py-0.5"></p>  
              </div>

               <!--Account Type field  -->
              <div class="mb-2">
                <label for="accountType" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Account Type</label>
                  <select id="accountType" th:field="*{accountType}" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full p-2.5"  required>
                   <option value="">Select Account Type</option>
                   <option value="SAVINGS">Saving</option>
                   <option value="CURRENT">Current</option>
              </select>

                <p th:if="${#fields.hasErrors('accountType')}"
                th:errors="*{accountType}"
                class="text-red-600 px-1 py-0.5"></p>
            </div>

               <!--Address field  -->
              <div class="mb-2">
                <label for="address" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Address</label>
                  <textarea id="address" th:field="*{address}" rows="3" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full p-2.5" placeholder="Enter full address" required></textarea>

                  <p th:if="${#fields.hasErrors('address')}"
                    th:errors="*{address}"
                    class="text-red-600 px-1 py-0.5"></p>
              </div>
                                       
                <!-- button -->
                 <div class="mb-2 flex justify-center space-x-3">
                   <button type="submit" class="px-3 py-2 rounded bg-gray-800 text-white dark:bg-blue-700 dark:hover:bg-blue-900 hover:bg-gray-900">Create</button>
                   <button type="reset" class="px-3 py-2 rounded bg-orange-800 text-white dark:bg-orange-700 dark:hover:bg-orange-900 hover:bg-orange-900">Reset</button>
                 </div>     
          </form>
          </div>
    </div>
   </div>
    
  </div>
  <script>
    console.log("Signup page");
  </script>
</body>
</html>
