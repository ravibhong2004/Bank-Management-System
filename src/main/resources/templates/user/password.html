<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#content}, ~{::title}, ~{::script})}">
<head>
    <title>Change Password</title>
</head>

<body>
<div id="content">
<!-- Sidebar -->
  <div th:replace="~{User/usersidebar :: usersidebar}"></div>
<div class="min-h-screen flex items-center justify-center">

    <div class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow w-full max-w-md">

        <h2 class="text-2xl font-bold mb-6 text-gray-900 dark:text-white">
            Change Password 🔒
        </h2>

        <!-- SUCCESS MESSAGE -->
        <div th:if="${param.success}" class="text-green-600 mb-4"> Password updated successfully ✅</div>

        <!-- ERROR MESSAGE -->
        <div th:if="${param.error}" class="text-red-600 mb-4"> Wrong old password ❌</div>
        <form th:action="@{/users/password}" method="post">

            <!-- OLD PASSWORD -->
            <div class="mb-4">
                <label class="block mb-1">Old Password</label>
                <input type="password" name="oldPassword"
                       class="w-full p-2 border rounded dark:bg-gray-700" required>
            </div>

            <!-- NEW PASSWORD -->
            <div class="mb-4">
                <label class="block mb-1">New Password</label>
                <input type="password" name="newPassword"
                       class="w-full p-2 border rounded dark:bg-gray-700" required>
            </div>

            <!-- BUTTON -->
            <button class="bg-blue-600 text-white px-4 py-2 rounded w-full">
                Update Password
            </button>

        </form>

    </div>

</div>

</div>
<script>
    console.log("password page");
</script>
</body>
</html>
