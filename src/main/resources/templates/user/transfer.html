<!DOCTYPE html>
<html lang="en" th:replace="~{base ::parent(~{::#content}, ~{::title},~{::script})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transfer</title>
</head>
<body>
    <div id="content">
         <!-- Sidebar -->
  <div th:replace="~{User/usersidebar :: usersidebar}"></div>
    <div class="md:pl-64 pt-20 min-h-screen bg-white dark:bg-gray-900 p-6 py-10 flex justify-center">
  
  <div class="w-full max-w-lg bg-gray-100 dark:bg-gray-800 p-8 rounded-xl shadow-lg space-y-5">
    
    <h2 class="text-2xl font-semibold text-gray-900 dark:text-white">
      Transfer Money
    </h2>
    <div data-th-replace="~{message :: messagebox}"></div>
    
    <form th:action="@{/users/transfer}" method="post" class="space-y-4">
    <div class="space-y-1">
      <label class="block text-gray-600 dark:text-gray-400">From Account</label>
      <input type="text" name="fromAccount" 
             th:value="${account != null ? account.accountNumber : ''}" 
             readonly class="w-full mt-1 p-2 rounded bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white">
    </div>

    <div class="space-y-1">
      <label class="block text-gray-600 dark:text-gray-400">To Account</label>
      <input type="text" name="toAccount" 
              placeholder="Enter account number"
              class="w-full mt-1 p-2 rounded border dark:bg-gray-700 dark:text-white" required>
    </div>

    <div class="space-y-1">
      <label class="block text-gray-600 dark:text-gray-400">Amount</label>
      <input type="number" step="0.01" name="amount" 
             placeholder="Enter amount"
             class="w-full mt-1 p-2 rounded border dark:bg-gray-700 dark:text-white" required>
    </div>

    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700"> Transfer Now </button>
    </form>
  </div>
</div>
</div>

<script>
        console.log("transfer page");
    </script>
</body>
</html>
